site_name: Python Geospatial Engineering Guide
site_description: Production-oriented geospatial curriculum for Python and backend engineers
docs_dir: content
theme:
  name: material
  palette:
  - scheme: default
    primary: blue grey
    accent: red
  - scheme: slate
    primary: blue grey
    accent: red
  features:
  - navigation.instant
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - toc.follow
  - search.highlight
  - search.suggest
  - content.code.copy
plugins:
- search
- mkdocstrings:
    handlers:
      python:
        options:
          show_source: true
          show_root_heading: true
markdown_extensions:
- admonition
- tables
- toc
- attr_list
- pymdownx.details
- pymdownx.highlight
- pymdownx.superfences
- pymdownx.tabbed
- pymdownx.emoji
- pymdownx.magiclink
extra_css:
- stylesheets/extra.css
extra_javascript:
- javascripts/config.js
nav:
- Home: index.md
- Overview:
  - Study Plan: study_plan.md
- Training Modules:
  - Day 01 - Concurrency and Integrations:
    - Overview: day01_concurrency/index.md
  - Day 02 - Provider Boundaries:
    - Overview: day02_oop/index.md
  - Day 03 - APIs and Tile Delivery:
    - Overview: day03_api/index.md
  - Day 04 - Testing Geospatial Systems:
    - Overview: day04_testing/index.md
  - Day 05 - Storage and Data:
    - Overview: day05_data/index.md
  - Day 06 - Performance and Observability:
    - Overview: day06_perf/index.md
  - Day 07 - Capstone:
    - Overview: day07_mock/index.md
